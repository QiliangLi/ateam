<!doctype html>
<html lang="zh">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cat Cafe Chat</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app-container">
      <header class="chat-header">
        <div class="header-left">
          <button id="toggleSidebar" class="icon-btn" title="切换侧边栏">☰</button>
          <div>
            <h1>Cat Cafe Chat</h1>
            <p>多猫协作 · Web 聊天界面</p>
          </div>
        </div>
        <div class="status-pill" id="statusText">连接中…</div>
      </header>

      <main class="chat-main">
        <aside class="sidebar-left" id="sidebarLeft">
          <div class="sidebar-header">
            <h2>猫猫成员</h2>
            <button id="refreshCats" class="icon-btn" title="刷新">↻</button>
          </div>
          <div id="catList"></div>
        </aside>

        <section id="log" class="chat-log"></section>

        <section class="chat-composer">
          <textarea id="prompt" rows="3" placeholder="输入你的消息，点击发送后由选中的猫猫协作处理..."></textarea>
          <div class="composer-actions">
            <button id="clearBtn" class="ghost">清空</button>
            <button id="runBtn">发送</button>
          </div>
        </section>
      </main>
    </div>

    <script src="/session-manager.js"></script>
    <script src="/history-panel.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
