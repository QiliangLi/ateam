<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 780" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4e342e" flood-opacity="0.08"/>
    </filter>
    <style>
      text { font-family: 'Inter', "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif; }
      .layer-title { font-size: 20px; font-weight: 700; fill: #4e342e; }
      .box-text { font-size: 15px; font-weight: 700; fill: #5d4037; }
      .sub-text { font-size: 11px; font-weight: 400; fill: #795548; }
      .arrow-text { font-size: 14px; font-weight: 600; fill: #8d6e63; }
      .arrow-subtext { font-size: 11px; font-weight: 400; fill: #a1887f; }
      .title { font-size: 26px; font-weight: 800; fill: #3e2723; }
      .title-sub { font-size: 14px; font-weight: 500; fill: #8d6e63; }
      .badge-text { font-size: 11px; font-weight: 600; fill: #ffffff; }
      .note-text { font-size: 12px; font-weight: 500; fill: #6d4c41; }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#bcaaa4" />
    </marker>
  </defs>

  <rect width="840" height="780" fill="#fdfbf7" rx="16"/>
  
  <text x="420" y="55" class="title" text-anchor="middle">三层架构：MCP 能力层 × Skills 经验层 × Agent 编排层</text>
  <text x="420" y="75" class="title-sub" text-anchor="middle">Capability / Experience / Orchestration</text>

  <!-- Top Layer: Agent -->
  <g transform="translate(60, 100)">
    <rect width="720" height="150" rx="16" fill="#fff8e1" filter="url(#shadow)" stroke="#ffecb3" stroke-width="2"/>
    <text x="360" y="32" class="layer-title" text-anchor="middle">Agent 编排层</text>
    
    <g transform="translate(45, 55)">
      <rect width="180" height="70" rx="8" fill="#ffffff" stroke="#ffca28" stroke-width="2"/>
      <text x="90" y="28" class="box-text" text-anchor="middle">Router（路由）</text>
      <text x="90" y="44" class="sub-text" text-anchor="middle">reads skill catalog:</text>
      <text x="90" y="58" class="sub-text" text-anchor="middle">name + description</text>
      
      <!-- Vector Key Icon instead of emoji -->
      <g transform="translate(-10, -10)">
        <circle cx="14" cy="14" r="14" fill="#ffb300"/>
        <path d="M12.5 10A2.5 2.5 0 1 0 10 12.5 2.5 2.5 0 0 0 12.5 10zm-1 4L16 9.5l1.5 1.5.5-.5-1.5-1.5.5-.5-1-1-4.5 4.5A2.5 2.5 0 0 0 11.5 14z" fill="#fff"/>
      </g>
    </g>
    <text x="135" y="140" class="sub-text" text-anchor="middle" fill="#f57f17">metadata always-on (name + description)</text>
    
    <g transform="translate(245, 55)">
      <rect width="130" height="70" rx="8" fill="#ffffff" stroke="#ffca28" stroke-width="2"/>
      <text x="65" y="40" class="box-text" text-anchor="middle">Planner（计划）</text>
    </g>
    
    <g transform="translate(395, 55)">
      <rect width="130" height="70" rx="8" fill="#ffffff" stroke="#ffca28" stroke-width="2"/>
      <text x="65" y="40" class="box-text" text-anchor="middle">Executor（执行）</text>
    </g>

    <g transform="translate(545, 55)">
      <rect width="130" height="70" rx="8" fill="#ffffff" stroke="#ffca28" stroke-width="2"/>
      <text x="65" y="40" class="box-text" text-anchor="middle">Evaluator（评估/QC）</text>
    </g>
  </g>

  <!-- Arrow 1 -->
  <path d="M 420 250 L 420 300" stroke="#bcaaa4" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="435" y="275" class="arrow-text">Select skill → Load SKILL.md body → Execute workflow</text>
  <text x="435" y="292" class="arrow-subtext">No selection = no body loaded</text>
  
  <!-- Middle Layer: Skills -->
  <g transform="translate(60, 310)">
    <rect width="720" height="150" rx="16" fill="#fbe9e7" filter="url(#shadow)" stroke="#ffccbc" stroke-width="2"/>
    <text x="360" y="32" class="layer-title" text-anchor="middle">Skills 经验层</text>
    
    <g transform="translate(80, 50)">
      <rect width="360" height="85" rx="8" fill="#ffffff" stroke="#ff8a65" stroke-width="2"/>
      <text x="180" y="25" class="box-text" text-anchor="middle">SKILL.md（核心执行逻辑）</text>
      <text x="180" y="45" class="sub-text" text-anchor="middle">• workflow（分步）  • output contract（交付契约）</text>
      <text x="180" y="65" class="sub-text" text-anchor="middle">• QC checklist（自检）  • no-surprises（不惊吓）</text>
      
      <!-- Vector Shield Icon instead of emoji -->
      <g transform="translate(-10, -10)">
        <circle cx="14" cy="14" r="14" fill="#f4511e"/>
        <path d="M14 6l-5 2v4c0 3 2.5 5.5 5 7 2.5-1.5 5-4 5-7V8l-5-2zm-1 8h-2v-2h2v2zm0-3h-2V8h2v3z" fill="#fff"/>
      </g>
    </g>

    <g transform="translate(460, 50)">
      <rect width="180" height="85" rx="8" fill="#ffffff" stroke="#ff8a65" stroke-width="2" stroke-dasharray="4"/>
      <text x="90" y="32" class="box-text" text-anchor="middle">refs/ scripts/ assets/</text>
      <text x="90" y="48" class="box-text" text-anchor="middle">（按需加载）</text>
      <text x="90" y="68" class="sub-text" text-anchor="middle">only when referenced</text>
    </g>
  </g>

  <!-- Arrow 2 -->
  <path d="M 420 460 L 420 520" stroke="#bcaaa4" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <text x="435" y="485" class="arrow-text">Call tools / Read resources</text>
  <text x="435" y="502" class="arrow-subtext">schema-bound calls</text>

  <!-- Bottom Layer: MCP -->
  <g transform="translate(60, 530)">
    <rect width="720" height="150" rx="16" fill="#e0f2f1" filter="url(#shadow)" stroke="#b2dfdb" stroke-width="2"/>
    <text x="360" y="32" class="layer-title" text-anchor="middle">MCP 能力层</text>
    <text x="600" y="28" class="arrow-subtext" fill="#00897b" text-anchor="middle">MCP exposes capability surface</text>
    
    <g transform="translate(50, 55)">
      <rect width="190" height="75" rx="8" fill="#ffffff" stroke="#26a69a" stroke-width="2"/>
      <text x="95" y="28" class="box-text" text-anchor="middle">Tools（工具）</text>
      <text x="95" y="48" class="sub-text" text-anchor="middle">Actions constrained by</text>
      <text x="95" y="62" class="sub-text" text-anchor="middle">JSON Schema</text>
    </g>
    
    <g transform="translate(265, 55)">
      <rect width="190" height="75" rx="8" fill="#ffffff" stroke="#26a69a" stroke-width="2"/>
      <text x="95" y="32" class="box-text" text-anchor="middle">Resources（资源）</text>
      <text x="95" y="52" class="sub-text" text-anchor="middle">Read-only data via URI</text>
    </g>

    <g transform="translate(480, 55)">
      <rect width="190" height="75" rx="8" fill="#ffffff" stroke="#26a69a" stroke-width="2"/>
      <text x="95" y="28" class="box-text" text-anchor="middle">Prompts（模板）</text>
      <text x="95" y="48" class="sub-text" text-anchor="middle">Reusable prompt</text>
      <text x="95" y="62" class="sub-text" text-anchor="middle">scaffolds</text>
    </g>
  </g>

  <!-- Bottom Right Note -->
  <text x="780" y="740" class="note-text" text-anchor="end">Skills ≠ 原子操作；Skills = 专业经验 + 工作流 + 质检标准</text>

</svg>
