<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 850" width="100%" height="100%">
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#4e342e" flood-opacity="0.08"/>
    </filter>
    <style>
      text { font-family: 'Inter', "Noto Sans SC", "Source Han Sans SC", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif; }
      .title { font-size: 26px; font-weight: 800; fill: #3e2723; }
      .title-sub { font-size: 14px; font-weight: 500; fill: #8d6e63; }
      .node-title { font-size: 16px; font-weight: 700; fill: #4e342e; }
      .node-text { font-size: 13px; font-weight: 400; fill: #6d4c41; }
      .edge-text { font-size: 13px; font-weight: 600; fill: #d84315; }
      .edge-subtext { font-size: 11px; font-weight: 500; fill: #6d4c41; }
      .fallback-list { font-size: 11.5px; font-weight: 500; fill: #c62828;}
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8d6e63" />
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d84315" />
    </marker>
  </defs>

  <rect width="800" height="850" fill="#fdfbf7" rx="16"/>
  <text x="400" y="45" class="title" text-anchor="middle">路由漏斗：description 决定正文能否进场</text>
  <text x="400" y="65" class="title-sub" text-anchor="middle">progressive disclosure: metadata → body → execution</text>

  <!-- Node 1 -->
  <g transform="translate(250, 100)">
    <rect width="300" height="50" rx="25" fill="#e8eaf6" stroke="#c5cae9" stroke-width="2" filter="url(#shadow)"/>
    <text x="150" y="30" class="node-title" text-anchor="middle">1. User Message（用户请求）</text>
  </g>

  <!-- Arrow -->
  <path d="M 400 150 L 400 190" stroke="#8d6e63" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Node 2 -->
  <g transform="translate(250, 190)">
    <rect width="300" height="60" rx="8" fill="#fff3e0" stroke="#ffe0b2" stroke-width="2" filter="url(#shadow)"/>
    <text x="150" y="25" class="node-title" text-anchor="middle">2. Skill Catalog Metadata（常驻元信息）</text>
    <text x="150" y="45" class="node-text" text-anchor="middle">only name + description</text>
  </g>

  <!-- Arrow -->
  <path d="M 400 250 L 400 300" stroke="#8d6e63" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Node 3: Decision -->
  <g transform="translate(250, 300)">
    <polygon points="150,0 280,40 150,80 20,40" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="2" filter="url(#shadow)"/>
    <text x="150" y="38" class="node-title" text-anchor="middle">3. Semantic Match?</text>
    <text x="150" y="56" class="node-text" text-anchor="middle">（语义匹配）</text>
  </g>

  <!-- Arrow No -->
  <path d="M 530 340 L 630 340 L 630 380" stroke="#d84315" stroke-width="2" stroke-dasharray="4" fill="none" marker-end="url(#arrowhead-red)"/>
  <text x="630" y="330" class="edge-text" text-anchor="middle">No selection = No body loaded</text>
  <g transform="translate(530, 380)">
    <rect width="200" height="75" rx="8" fill="#ffebee" stroke="#ffcdd2" stroke-width="2"/>
    <text x="100" y="22" class="node-title" text-anchor="middle" fill="#c62828">Fallbacks（兜底）</text>
    <text x="100" y="40" class="fallback-list" text-anchor="middle">• Direct answer</text>
    <text x="100" y="55" class="fallback-list" text-anchor="middle">• Ask 1 clarifying question</text>
    <text x="100" y="70" class="fallback-list" text-anchor="middle">• Try other skill / tool</text>
  </g>

  <!-- Arrow Yes -->
  <path d="M 400 380 L 400 440" stroke="#8d6e63" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <text x="430" y="415" class="node-title" fill="#2e7d32">YES</text>

  <!-- Node 4 -->
  <g transform="translate(200, 440)">
    <rect width="400" height="60" rx="8" fill="#f3e5f5" stroke="#e1bee7" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="25" class="node-title" text-anchor="middle">4. Load Selected SKILL.md（加载正文）</text>
    <text x="200" y="45" class="node-text" text-anchor="middle">workflow + rules + output contract + QC</text>
  </g>

  <!-- Arrow -->
  <path d="M 400 500 L 400 560" stroke="#8d6e63" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Node 5 -->
  <g transform="translate(200, 560)">
    <rect width="400" height="60" rx="8" fill="#e0f7fa" stroke="#b2ebf2" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="25" class="node-title" text-anchor="middle">5. Execute Workflow（执行工作流）</text>
    <text x="200" y="45" class="node-text" text-anchor="middle">call tools / read resources / run scripts</text>
  </g>

  <!-- Arrow to 6 -->
  <path d="M 400 620 L 400 680" stroke="#8d6e63" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Node 6 -->
  <g transform="translate(200, 680)">
    <rect width="400" height="60" rx="8" fill="#e8f5e9" stroke="#a5d6a7" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="25" class="node-title" text-anchor="middle">6. Produce Output &amp; QC（交付与自检）</text>
    <text x="200" y="45" class="node-text" text-anchor="middle">QC fails → fix → QC again</text>
  </g>

  <!-- Loop back for QC fail -->
  <path d="M 200 710 C 60 710, 60 590, 200 590" stroke="#d84315" stroke-width="2" fill="none" marker-end="url(#arrowhead-red)"/>
  <text x="120" y="645" class="edge-text" text-anchor="middle">QC fails</text>
  <text x="120" y="660" class="edge-text" text-anchor="middle">→ Fix!</text>

</svg>
